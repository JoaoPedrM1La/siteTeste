services:
  postgres:
    image: postgres:alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./back/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-dados:/var/lib/postgresql/data
    networks:
      - estoque-network

  server:
    build: ./back
    container_name: server
    depends_on:
      - postgres
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "3000:3000"
    networks:
      - estoque-network
  
  web:
    build: ./front
    container_name: web
    depends_on:
      - server
    ports:
      - "8080:80"
    networks:
      - estoque-network

volumes:
  postgres-dados:

networks:
  estoque-network: